version: 2

models:
  - name: ads_o2o_daily_report
    description: "O2O 业务日报 ADS 表 — 按日×平台×门店粒度，数据源：ods_rpa_* fin表 + dim_o2o_sku_mapping + dim_o2o_store_ref"
    columns:
      - name: dt
        description: "日期（来自各平台财务结算表的账单日期）"
        tests: [not_null]
      - name: platform
        description: "平台（饿了么/京东/美团）"
        tests: [not_null]
      - name: store_name
        description: "门店简称（括号内文字，如余杭店、首南店）"
        tests: [not_null]
      - name: province
        description: "省份（来自 dim_o2o_store_ref）"
      - name: city
        description: "城市（来自 dim_o2o_store_ref）"
      - name: has_store_ref
        description: "门店是否在 dim_o2o_store_ref 中有记录（FALSE=门店名匹配失败，需核查）"
      - name: revenue
        description: "实收金额（含各项/区域补贴）= 美团商家应收款 / 饿了么净营业额合计 / 京东结算合计"
      - name: platform_fee
        description: "平台服务费 = 美团佣金 / 饿了么服务费合计 / 京东代收到家佣金（绝对值）"
      - name: shipping
        description: "运费 = 平台配送费（fin表）+ 麦芽田第三方配送费（仅京东）"
      - name: avg_shipping
        description: "单均运费 = shipping / order_count"
      - name: promotion_cost
        description: "推广费 = 美团商家活动支出 / 饿了么商业化充值（绝对值）/ 京东暂无"
      - name: order_count
        description: "票数（DISTINCT 订单号数量）"
      - name: cost
        description: "招商货品成本 = mini橙明细商品数量 × 换算比 × 总部招商价"
      - name: rent_labor
        description: "日均房租人工（来自 dim_o2o_store_ref，同一门店在多平台行中重复；汇总时请用 MAX(rent_labor) per store）"
      - name: gross_profit
        description: "招商利润（不含房租人工）= revenue - cost - platform_fee"
      - name: net_profit
        description: "利润（扣房租人工）= gross_profit - rent_labor"
      - name: store_type
        description: "门店类型（有 dim_o2o_store_ref 记录=直营，否则 NULL）"
