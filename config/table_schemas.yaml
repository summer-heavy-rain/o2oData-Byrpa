# ============================================================
# ODS 表结构定义（唯一权威来源 - Single Source of Truth）
# 用途: scripts/sync_schema.py 读取此文件
#       → 自动建表 / 加列 / 生成 dbt _sources.yml
# 规则:
#   - 普通 ODS 表: 业务列默认 TEXT，元数据列(dt/_source_file/_load_time)自动添加
#   - 自定义表:    设 custom_ddl: true，手动指定每列的类型
# 修改流程: 编辑此文件 → python -m scripts.sync_schema
# ============================================================

version: 1

defaults:
  schema: public
  meta_columns:
    - { name: dt, type: "DATE NOT NULL" }
    - { name: _source_file, type: "TEXT NOT NULL" }
    - { name: _load_time, type: "TIMESTAMPTZ NOT NULL DEFAULT NOW()" }

